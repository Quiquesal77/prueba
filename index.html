<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso 2027 - 2027 Módulos Enrique García</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F4EF;
    --surface:#FFFFFF;
    --ink:#20272B;
    --ink-soft:#5B6470;
    --teal:#0F4C5C;
    --teal-soft:#DCEAEA;
    --border:#E2DFD5;
    --gray:#8A8F94;
    --holiday-bg:#F8D7DA;
    --holiday-border:#E6A8AD;
    --holiday-ink:#8A2D36;
    --radius:10px;
    --shadow:0 6px 24px rgba(15,30,35,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,Segoe UI,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:980px;margin:0 auto;padding:28px 20px 56px;}

  /* ---------- Header ---------- */
  .topbar{
    display:grid;grid-template-columns:minmax(190px,260px) 1fr 120px;align-items:center;
    gap:22px;margin-bottom:24px;
  }
  .header-img{
    width:100%;height:auto;object-fit:contain;display:block;
  }
  .header-img--left{max-width:260px;max-height:115px;justify-self:start;}
  .header-img--right{max-width:112px;max-height:112px;justify-self:end;}
  .topbar__title{text-align:center;}
  .eyebrow{
    margin:0 0 4px;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--teal);font-weight:600;
  }
  .topbar__title h1{
    margin:0;font-family:'Newsreader',Georgia,serif;font-weight:500;
    font-size:clamp(24px,4vw,36px);letter-spacing:-0.01em;
  }
  .topbar__nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;}
  #monthLabel{
    margin:0;min-width:190px;text-align:center;font-family:'Newsreader',Georgia,serif;
    font-weight:500;font-size:21px;text-transform:capitalize;
  }

  /* ---------- Month selector ---------- */
  .month-selector{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));
    gap:10px;margin:0 0 22px;
  }
  .month-card{
    border:1px solid var(--border);background:var(--surface);color:var(--ink);
    border-radius:var(--radius);padding:13px 10px;cursor:pointer;text-align:center;
    box-shadow:0 2px 10px rgba(15,30,35,0.04);transition:background .15s,border-color .15s,transform .1s,box-shadow .15s;
    font-family:'Inter',system-ui,Segoe UI,Arial,sans-serif;
  }
  .month-card:hover{background:var(--teal-soft);border-color:var(--teal);box-shadow:var(--shadow);transform:translateY(-1px);}
  .month-card.is-active{background:var(--teal);border-color:var(--teal);color:#fff;}
  .month-card__name{display:block;font-weight:700;text-transform:capitalize;}
  .month-card__events{display:block;margin-top:4px;font-size:12px;opacity:.82;}
  .calendar-panel[hidden]{display:none;}
  .toolbar{
    display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;justify-content:center;
    margin:0 0 18px;
  }
  .dropdown{position:relative;}
  .dropdown-panel{
    position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
    width:min(92vw,560px);max-height:420px;overflow-y:auto;z-index:30;
    background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);
    padding:16px;text-align:left;
  }
  .dropdown-panel[hidden]{display:none;}
  .exam-list{display:flex;flex-direction:column;gap:12px;}
  .exam-item{border-left:3px solid var(--teal);padding:6px 0 6px 12px;}
  .exam-item__date{margin:0 0 3px;font-size:13px;font-weight:700;color:var(--teal);text-transform:capitalize;}
  .exam-item__title{margin:0 0 4px;font-size:15px;font-weight:700;}
  .exam-item__details{margin:0;font-size:13.5px;color:var(--ink-soft);line-height:1.45;}
  .exam-item__desc{margin:4px 0 0;font-size:13.5px;color:var(--ink);line-height:1.45;}
  .calendar-hint{
    border:1px dashed var(--border);background:rgba(255,255,255,.55);border-radius:var(--radius);
    padding:18px;text-align:center;color:var(--ink-soft);font-size:14px;line-height:1.5;margin-bottom:18px;
  }
  .iconbtn{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
    background:var(--surface);color:var(--teal);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s;
  }
  .iconbtn:hover{background:var(--teal-soft);}
  .iconbtn:active{transform:scale(.94);}
  .iconbtn:disabled{opacity:.35;cursor:not-allowed;}
  .pillbtn{
    border:1px solid var(--border);background:var(--surface);color:var(--ink);
    border-radius:999px;padding:7px 16px;font-size:13.5px;font-weight:600;
    cursor:pointer;transition:background .15s;
  }
  .pillbtn:hover{background:var(--teal-soft);}
  button:focus-visible,.day:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

  /* ---------- Banners ---------- */
  .banner{
    border-radius:var(--radius);padding:11px 16px;font-size:14px;margin-bottom:16px;
  }
  .banner--loading{background:var(--teal-soft);color:var(--teal);}
  .banner--error{background:#FBE7E1;color:#8A3320;}

  /* ---------- Weekdays + grid ---------- */
  .weekdays{
    display:grid;grid-template-columns:repeat(7,1fr);
    font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-soft);font-weight:600;padding:0 2px 8px;
  }
  .weekdays span{text-align:center;}
  .grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:6px;
  }
  .day{
    position:relative;aspect-ratio:1/0.92;border-radius:var(--radius);
    border:1px solid var(--border);background:var(--surface);
    display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;
    padding:8px 8px 6px;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .1s;
    font-family:inherit;
  }
  .day:hover{box-shadow:var(--shadow);border-color:var(--teal);transform:translateY(-1px);}
  .day.empty{visibility:hidden;cursor:default;}
  .day__num{
    font-family:'Newsreader',Georgia,serif;font-size:19px;font-weight:500;color:var(--ink);
  }
  .day.today .day__num{color:var(--teal);font-weight:600;}
  .day.weekend{background:#ECECEC;border-color:#D6D6D6;}
  .day.weekend:hover{background:#E6E6E6;}
  .day.holiday{background:var(--holiday-bg);border-color:var(--holiday-border);}
  .day.holiday:hover{background:#F4C7CC;border-color:#D88991;}
  .day__holiday{
    font-size:10px;line-height:1.15;color:var(--holiday-ink);font-weight:700;
    margin-top:4px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .day__dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .dot--more{font-size:10px;color:var(--ink-soft);font-weight:600;}

  /* ==================================================================
     SCROLL DE TEXTO DE LOS EVENTOS DENTRO DE CADA DÍA

     PARA CAMBIAR EL COLOR DEL TEXTO DEL SCROLL EN EL FUTURO:
     modifica únicamente el valor de "color" en .day__event-scroll.

     Ejemplos:
       color:#C62828;  -> rojo actual
       color:#0F4C5C;  -> verde azulado de la web
       color:#20272B;  -> negro/gris oscuro
     ================================================================== */
  .day__event-scroll{
    width:100%;
    overflow:hidden;
    white-space:nowrap;
    margin-top:auto;
    color:#C62828; /* << COLOR DEL TEXTO DEL SCROLL: CAMBIAR AQUÍ */
    font-size:10px;
    line-height:1.2;
    font-weight:700;
    pointer-events:none;
  }
  .day__event-scroll-text{
    display:inline-block;
    min-width:100%;
    padding-left:100%;
    animation:dayEventScroll 10s linear infinite;
  }
  .day:hover .day__event-scroll-text,
  .day:focus-visible .day__event-scroll-text{
    animation-play-state:paused;
  }
  @keyframes dayEventScroll{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
  }

  /* corner viewfinder accent — usado en "hoy" y en el modal */
  .has-corners{position:relative;}
  .corner{position:absolute;width:10px;height:10px;pointer-events:none;}
  .corner.tl{top:-1px;left:-1px;border-top:2px solid var(--teal);border-left:2px solid var(--teal);border-radius:3px 0 0 0;}
  .corner.tr{top:-1px;right:-1px;border-top:2px solid var(--teal);border-right:2px solid var(--teal);border-radius:0 3px 0 0;}
  .corner.bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--teal);border-left:2px solid var(--teal);border-radius:0 0 0 3px;}
  .corner.br{bottom:-1px;right:-1px;border-bottom:2px solid var(--teal);border-right:2px solid var(--teal);border-radius:0 0 3px 0;}

  /* ---------- Legend ---------- */
  .legend{
    display:flex;flex-wrap:wrap;gap:14px;margin-top:24px;padding-top:16px;
    border-top:1px solid var(--border);font-size:13px;color:var(--ink-soft);
  }
  .legend__item{display:flex;align-items:center;gap:6px;}
  .sync-note{font-size:12px;color:var(--ink-soft);margin-top:10px;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,28,32,.42);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal-overlay[hidden]{display:none;}
  .modal{
    background:var(--surface);border-radius:14px;max-width:520px;width:100%;
    max-height:85vh;overflow-y:auto;padding:26px 26px 22px;box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .modal__close{
    position:absolute;top:14px;right:16px;border:none;background:none;font-size:22px;
    color:var(--ink-soft);cursor:pointer;line-height:1;
  }
  .modal__title{
    font-family:'Newsreader',Georgia,serif;font-weight:500;font-size:23px;
    margin:0 28px 18px 0;text-transform:capitalize;
  }
  .event-card{
    border-left:3px solid var(--gray);padding:4px 0 4px 14px;margin-bottom:16px;
  }
  .event-card__meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .event-card__time{font-size:12.5px;color:var(--ink-soft);font-weight:600;}
  .event-card__badge{
    font-size:11px;color:#fff;padding:2px 8px;border-radius:999px;font-weight:600;
    letter-spacing:.02em;
  }
  .event-card__title{margin:0 0 2px;font-size:15.5px;font-weight:700;}
  .event-card__curso{margin:0 0 4px;font-size:13px;color:var(--ink-soft);}
  .event-card__desc{margin:0;font-size:13.5px;color:var(--ink);line-height:1.5;}
  .holiday-card{
    border-left:3px solid var(--holiday-border);background:var(--holiday-bg);
    border-radius:10px;padding:12px 14px;margin-bottom:16px;color:var(--holiday-ink);
  }
  .holiday-card__label{margin:0 0 3px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
  .holiday-card__name{margin:0;font-size:15px;font-weight:700;}
  .empty-state{font-size:14px;color:var(--ink-soft);line-height:1.6;}
  .empty-state span{display:block;margin-top:4px;font-size:12.5px;}

  @media (max-width:600px){
    .wrap{padding-top:20px;}
    .topbar{grid-template-columns:82px 1fr 66px;gap:10px;}
    .header-img--left{max-width:82px;max-height:58px;}
    .header-img--right{max-width:58px;max-height:58px;}
    .dropdown-panel{left:0;right:auto;transform:none;width:min(92vw,520px);}
    .topbar__title h1{font-size:clamp(20px,7vw,27px);}
    .eyebrow{font-size:11px;}
    .topbar__nav{flex-wrap:wrap;}
    #monthLabel{min-width:150px;font-size:19px;}
    .month-selector{grid-template-columns:repeat(2,1fr);}
    .day{aspect-ratio:1/0.8;padding:6px;}
    .day__num{font-size:16px;}
    .modal{border-radius:0;max-height:100vh;height:100%;width:100%;}
    .modal-overlay{padding:0;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }
</style>
</head>

       5. Duplica y adapta loadData() para leer AVISOS_CSV_URL y guardar las

       6. Duplica renderExamList() como renderAvisosList() y sustituye:

<script>
/* =====================================================================
   CONFIGURACIÓN — esto es lo único que necesitas tocar en este archivo.

   1) CSV_URL: pega la URL publicada de tu Google Sheet
      (Archivo > Compartir > Publicar en la web > selecciona la hoja
      de eventos > formato "Valores separados por comas (.csv)").

   2) FESTIVOS_CSV_URL: pega la URL publicada en CSV de la hoja de festivos.
      Puede dejarse en blanco ("") si no quieres usar festivos.

   3) CURSO_INICIO / CURSO_FIN: mes de inicio y fin del curso a mostrar.
      "month" va de 0 (enero) a 11 (diciembre).

   La hoja de eventos debe tener estas columnas (los nombres no son
   sensibles a mayúsculas/acentos), solo Fecha y Titulo son obligatorias:

     Fecha        -> AAAA-MM-DD  (o DD/MM/AAAA)
     Hora         -> opcional, texto libre, ej. "10:00"
     Titulo       -> texto corto
     Categoria    -> opcional, ej. Examen / Entrega / Reunión / Clase
     Curso        -> opcional, ej. "2º DRI"
     Aula         -> opcional, ej. "Aula 112"
     Lugar        -> opcional, ej. "Laboratorio"
     Descripcion  -> opcional, texto libre

   La hoja de festivos debe tener estas columnas:

     Nombre       -> ej. Navidad / Puente de diciembre / Semana Santa
     Inicio       -> AAAA-MM-DD  (o DD/MM/AAAA)
     Fin          -> AAAA-MM-DD  (o DD/MM/AAAA). Si es un solo día, repite Inicio.
===================================================================== */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqKQ483dUAmHe1pSopCyPwhyklkw1mScY32uCglwQNberKd9vNROlyd0JxTuohSogv5_jzgwkBMoi0/pub?gid=0&single=true&output=csv";
const FESTIVOS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqKQ483dUAmHe1pSopCyPwhyklkw1mScY32uCglwQNberKd9vNROlyd0JxTuohSogv5_jzgwkBMoi0/pub?gid=1581786704&single=true&output=csv"; // Pega aquí la URL CSV de la hoja Festivos cuando la publiques

/* ---------------------------------------------------------------------
   PARA UN SEGUNDO BOTÓN QUE LEA OTRA HOJA DE GOOGLE SHEETS:
   1) Descomenta y completa una constante como esta:

   const OTROS_DATOS_CSV_URL = "PEGA_AQUÍ_LA_URL_CSV_PUBLICADA";

   La hoja puede pertenecer al mismo archivo de Google Sheets, pero deberá
   publicarse por separado y normalmente tendrá un gid diferente.
   IMPORTANTE: crea también una variable independiente, por ejemplo:

   let otrosDatos = [];

   y una función de carga propia; no guardes esas filas en allEvents.
--------------------------------------------------------------------- */
const CURSO_INICIO = { year: 2027, month: 8 };  // septiembre 2026
const CURSO_FIN    = { year: 2027, month: 5 };  // junio 2027
/* ===================================================================== */

const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const PALETTE = ['#C1502E','#0F4C5C','#C98A1F','#51688C','#7A6C8E','#3F7D5C','#9C4F6E','#2E6B7A'];
const GRAY = '#8A8F94';

let eventsByDate = new Map();   // "AAAA-MM-DD" -> [eventos]
let categoryColor = {};         // "examen" -> "#hex"
let allEvents = [];             // eventos con fecha para listados desplegables
let holidaysByDate = new Map(); // "AAAA-MM-DD" -> [{nombre, inicio, fin}]
let current = { year: CURSO_INICIO.year, month: CURSO_INICIO.month };
let monthSelected = false;

const $ = (id) => document.getElementById(id);

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalize(s){
  return String(s ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function courseMonths(){
  const months = [];
  let year = CURSO_INICIO.year;
  let month = CURSO_INICIO.month;
  while (withinRange(year, month)){
    months.push({ year, month });
    month++;
    if (month > 11){ month = 0; year++; }
  }
  return months;
}

function eventsInMonth(year, month){
  let total = 0;
  for (const [key, list] of eventsByDate.entries()){
    const [y, m] = key.split('-').map(Number);
    if (y === year && m === month + 1) total += list.length;
  }
  return total;
}

function renderMonthSelector(){
  const selector = $('monthSelector');
  selector.innerHTML = '';
  courseMonths().forEach(({year, month}) => {
    const btn = document.createElement('button');
    btn.className = 'month-card' + (monthSelected && current.year === year && current.month === month ? ' is-active' : '');
    const total = eventsInMonth(year, month);
    btn.type = 'button';
    btn.innerHTML = `<span class="month-card__name">${MESES[month]} ${year}</span><span class="month-card__events">${total} ${total === 1 ? 'evento' : 'eventos'}</span>`;
    btn.addEventListener('click', () => {
      current = { year, month };
      monthSelected = true;
      renderMonth();
    });
    selector.appendChild(btn);
  });
}


function isExamEvent(ev){
  const title = normalize(ev.titulo);
  const category = normalize(ev.categoria);
  return title.includes('examen') || category === 'examen';
}

function upcomingExamEvents(){
  const today = new Date();
  today.setHours(0,0,0,0);
  return allEvents
    .filter(ev => isExamEvent(ev) && ev.fecha >= today)
    .sort((a,b) => a.fecha - b.fecha || String(a.hora).localeCompare(String(b.hora), 'es'));
}

function formatExamDate(date){
  return date.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function renderExamList(){
  const list = $('examList');
  if (!list) return;
  const exams = upcomingExamEvents();
  if (exams.length === 0){
    list.innerHTML = '<p class="empty-state">No hay exámenes programados a partir de hoy.<span>Se mostrarán automáticamente las filas cuyo Título contenga “Examen”.</span></p>';
    return;
  }
  list.innerHTML = exams.map(ev => {
    const details = [];
    if (ev.hora) details.push(`<strong>Hora:</strong> ${escapeHtml(ev.hora)}`);
    if (ev.aula) details.push(`<strong>Aula:</strong> ${escapeHtml(ev.aula)}`);
    if (ev.lugar) details.push(`<strong>Lugar:</strong> ${escapeHtml(ev.lugar)}`);
    if (ev.curso) details.push(`<strong>Curso:</strong> ${escapeHtml(ev.curso)}`);
    const extraDetails = Object.entries(ev.extras || {})
      .map(([k,v]) => `<strong>${escapeHtml(k)}:</strong> ${escapeHtml(v)}`);
    const allDetails = [...details, ...extraDetails].join(' · ');
    return `
      <article class="exam-item">
        <p class="exam-item__date">${escapeHtml(formatExamDate(ev.fecha))}</p>
        <h3 class="exam-item__title">${escapeHtml(ev.titulo)}</h3>
        ${allDetails ? `<p class="exam-item__details">${allDetails}</p>` : ''}
        ${ev.desc ? `<p class="exam-item__desc">${escapeHtml(ev.desc)}</p>` : ''}
      </article>`;
  }).join('');
}

function parseCSV(text){
  const rows = []; let row = [], field = '', inQuotes = false;
  for (let i=0;i<text.length;i++){
    const c = text[i];
    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i++; } else { inQuotes = false; }
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field=''; }
      else if (c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if (c === '\r'){ /* ignorar */ }
      else field += c;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ''));
}

function parseFecha(str){
  str = String(str ?? '').trim();
  let m;
  if ((m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/))){
    return new Date(+m[1], +m[2]-1, +m[3]);
  }
  if ((m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/))){
    return new Date(+m[3], +m[2]-1, +m[1]);
  }
  const fallback = new Date(str);
  return isNaN(fallback) ? null : fallback;
}

function addHolidayRange(nombre, inicio, fin){
  const start = new Date(inicio.getFullYear(), inicio.getMonth(), inicio.getDate());
  const end = new Date(fin.getFullYear(), fin.getMonth(), fin.getDate());
  if (end < start) return;
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)){
    const key = dateKey(d);
    if (!holidaysByDate.has(key)) holidaysByDate.set(key, []);
    holidaysByDate.get(key).push({ nombre, inicio:start, fin:end });
  }
}

async function loadHolidayData(){
  holidaysByDate = new Map();
  if (!FESTIVOS_CSV_URL || !FESTIVOS_CSV_URL.trim()) return;

  try{
    const url = FESTIVOS_CSV_URL + (FESTIVOS_CSV_URL.includes('?') ? '&' : '?') + 'cb=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    let text = await res.text();
    text = text.replace(/^\uFEFF/, '');
    const rows = parseCSV(text);
    if (rows.length < 2) return;

    const headers = rows[0].map(normalize);
    const idx = (names) => names.map(n => headers.indexOf(n)).find(i => i >= 0);
    const col = {
      nombre: idx(['nombre','fiesta','festivo','descripcion','descripción']),
      inicio: idx(['inicio','fecha inicio','desde','dia inicio','día inicio','fecha']),
      fin: idx(['fin','fecha fin','hasta','dia fin','día fin'])
    };
    if (col.inicio === undefined) throw new Error('Falta la columna Inicio en la hoja de festivos');

    for (let i=1;i<rows.length;i++){
      const r = rows[i];
      const inicio = parseFecha(r[col.inicio]);
      if (!inicio) continue;
      const fin = col.fin !== undefined && r[col.fin] ? parseFecha(r[col.fin]) : inicio;
      if (!fin) continue;
      const nombre = col.nombre !== undefined && r[col.nombre] ? r[col.nombre].trim() : 'Festivo';
      addHolidayRange(nombre || 'Festivo', inicio, fin);
    }
  } catch(err){
    console.warn('No se han podido cargar los festivos:', err);
    const errorBanner = $('errorBanner');
    if (errorBanner){
      errorBanner.hidden = false;
      errorBanner.textContent = 'Se han cargado los eventos, pero no se han podido cargar los festivos. Comprueba la URL CSV de la hoja de festivos. (' + err.message + ')';
    }
  }
}

async function loadData(){
  try{
    const url = CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + 'cb=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    let text = await res.text();
    text = text.replace(/^\uFEFF/, '');
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('La hoja está vacía');

    const headers = rows[0].map(normalize);
    const idx = (names) => names.map(n => headers.indexOf(n)).find(i => i >= 0);
    const col = {
      fecha: idx(['fecha']),
      hora: idx(['hora']),
      titulo: idx(['titulo']),
      categoria: idx(['categoria']),
      curso: idx(['curso','grupo']),
      aula: idx(['aula']),
      lugar: idx(['lugar','ubicacion','ubicación']),
      desc: idx(['descripcion','descripción'])
    };
    if (col.fecha === undefined || col.titulo === undefined){
      throw new Error('Faltan columnas obligatorias (Fecha / Titulo)');
    }

    eventsByDate = new Map();
    allEvents = [];
    const catSet = new Set();

    for (let i=1;i<rows.length;i++){
      const r = rows[i];
      const fechaRaw = r[col.fecha];
      if (!fechaRaw || !fechaRaw.trim()) continue;
      const fecha = parseFecha(fechaRaw);
      if (!fecha) continue;
      const categoria = col.categoria !== undefined ? r[col.categoria]?.trim() : '';
      if (categoria) catSet.add(categoria);
      const ev = {
        fecha,
        key: dateKey(fecha),
        hora: col.hora !== undefined ? r[col.hora]?.trim() : '',
        titulo: r[col.titulo]?.trim() || '(sin título)',
        categoria: categoria || '',
        curso: col.curso !== undefined ? r[col.curso]?.trim() : '',
        aula: col.aula !== undefined ? r[col.aula]?.trim() : '',
        lugar: col.lugar !== undefined ? r[col.lugar]?.trim() : '',
        desc: col.desc !== undefined ? r[col.desc]?.trim() : '',
        extras: Object.fromEntries(headers.map((h, j) => [h, r[j]?.trim() || '']).filter(([h,v]) => v && !['fecha','hora','titulo','categoria','curso','grupo','aula','lugar','ubicacion','ubicación','descripcion','descripción'].includes(h)))
      };
      const key = ev.key;
      if (!eventsByDate.has(key)) eventsByDate.set(key, []);
      eventsByDate.get(key).push(ev);
      allEvents.push(ev);
    }

    await loadHolidayData();

    const sortedCats = [...catSet].sort((a,b) => a.localeCompare(b,'es'));
    categoryColor = {};
    sortedCats.forEach((c,i) => categoryColor[c] = PALETTE[i % PALETTE.length]);

    renderLegend(sortedCats);
    $('syncNote').textContent = 'Sincronizado: ' + new Date().toLocaleString('es-ES');
    $('loadingBanner').hidden = true;
    $('errorBanner').hidden = true;
  } catch (err){
    $('loadingBanner').hidden = true;
    $('errorBanner').hidden = false;
    $('errorBanner').textContent = 'No se han podido cargar los datos del calendario. Comprueba la conexión o el enlace de la hoja de cálculo. (' + err.message + ')';
  }
  renderMonthSelector();
  renderExamList();
  if (monthSelected) renderMonth();
}

function colorFor(categoria){
  return categoria ? (categoryColor[categoria] || GRAY) : GRAY;
}

function renderLegend(cats){
  const legend = $('legend');
  legend.innerHTML = '';
  if (cats.length === 0){
    legend.innerHTML = '<span class="legend__item"><span class="dot" style="background:'+GRAY+'"></span>Sin categoría</span>';
  }
  cats.forEach(c => {
    const item = document.createElement('span');
    item.className = 'legend__item';
    item.innerHTML = `<span class="dot" style="background:${colorFor(c)}"></span>${escapeHtml(c)}`;
    legend.appendChild(item);
  });
  const holidayItem = document.createElement('span');
  holidayItem.className = 'legend__item';
  holidayItem.innerHTML = `<span class="dot" style="background:var(--holiday-bg);border:1px solid var(--holiday-border)"></span>Festivo / no lectivo`;
  legend.appendChild(holidayItem);
}

function withinRange(year, month){
  const a = CURSO_INICIO.year*12 + CURSO_INICIO.month;
  const b = CURSO_FIN.year*12 + CURSO_FIN.month;
  const v = year*12 + month;
  return v >= a && v <= b;
}

function renderMonth(){
  if (!monthSelected){
    $('calendarPanel').hidden = true;
    $('calendarHint').hidden = false;
    renderMonthSelector();
    return;
  }
  $('calendarPanel').hidden = false;
  $('calendarHint').hidden = true;
  renderMonthSelector();
  $('prevMonth').disabled = !withinRange(current.year, current.month-1);
  $('nextMonth').disabled = !withinRange(current.year, current.month+1);
  $('monthLabel').textContent = `${MESES[current.month]} ${current.year}`;

  const firstOfMonth = new Date(current.year, current.month, 1);
  const startWeekday = (firstOfMonth.getDay() + 6) % 7; // lunes = 0
  const daysInMonth = new Date(current.year, current.month+1, 0).getDate();

  const grid = $('calendarGrid');
  grid.innerHTML = '';

  const today = new Date();
  const todayKey = dateKey(today);

  for (let i=0;i<startWeekday;i++){
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
  }

  for (let d=1; d<=daysInMonth; d++){
    const date = new Date(current.year, current.month, d);
    const key = dateKey(date);
    const dayEvents = eventsByDate.get(key) || [];
    const dayHolidays = holidaysByDate.get(key) || [];
    const isToday = key === todayKey;
    const isWeekend = date.getDay() === 0 || date.getDay() === 6;
    const isHoliday = dayHolidays.length > 0;

    const btn = document.createElement('button');
    btn.className = 'day' + (isWeekend ? ' weekend' : '') + (isHoliday ? ' holiday' : '') + (isToday ? ' today has-corners' : '');
    btn.dataset.date = key;
    btn.setAttribute('aria-label', `${d} de ${MESES[current.month]}` + (dayEvents.length ? `, ${dayEvents.length} evento(s)` : '') + (isHoliday ? `, festivo: ${dayHolidays.map(h => h.nombre).join(', ')}` : ''));

    let dotsHtml = '';
    const shown = dayEvents.slice(0,4);
    shown.forEach(ev => dotsHtml += `<span class="dot" style="background:${colorFor(ev.categoria)}"></span>`);
    if (dayEvents.length > 4) dotsHtml += `<span class="dot--more">+${dayEvents.length-4}</span>`;

    const holidayHtml = isHoliday ? `<span class="day__holiday">${escapeHtml(dayHolidays[0].nombre)}</span>` : '';

    /* SCROLL DEL EVENTO: muestra Descripción y, si está vacía, Título.
       Si existen varios eventos, se unen mediante el separador « · ».
       El color se cambia en CSS, en la regla .day__event-scroll. */
    const scrollText = dayEvents
      .map(ev => (ev.desc || ev.titulo || '').trim())
      .filter(Boolean)
      .join(' · ');
    const scrollHtml = scrollText
      ? `<span class="day__event-scroll" aria-hidden="true"><span class="day__event-scroll-text">${escapeHtml(scrollText)}</span></span>`
      : '';

    btn.innerHTML = `<span class="day__num">${d}</span>${holidayHtml}${scrollHtml}<span class="day__dots">${dotsHtml}</span>`
      + (isToday ? '<span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>' : '');

    btn.addEventListener('click', () => openModal(date, dayEvents));
    grid.appendChild(btn);
  }
}

function openModal(date, dayEvents){
  const formatted = date.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
  $('modalTitle').textContent = formatted;

  const body = $('modalBody');
  const dayHolidays = holidaysByDate.get(dateKey(date)) || [];
  const holidaysHtml = dayHolidays.map(h => `
      <div class="holiday-card">
        <p class="holiday-card__label">Festivo / no lectivo</p>
        <p class="holiday-card__name">${escapeHtml(h.nombre)}</p>
      </div>
    `).join('');

  if (dayEvents.length === 0){
    body.innerHTML = holidaysHtml || `<p class="empty-state">No hay nada planificado para este día.<span>Añade una fila a la hoja compartida con esta fecha y aparecerá aquí.</span></p>`;
  } else {
    body.innerHTML = holidaysHtml + dayEvents.map(ev => `
      <div class="event-card" style="border-left-color:${colorFor(ev.categoria)}">
        <div class="event-card__meta">
          ${ev.hora ? `<span class="event-card__time">${escapeHtml(ev.hora)}</span>` : ''}
          ${ev.categoria ? `<span class="event-card__badge" style="background:${colorFor(ev.categoria)}">${escapeHtml(ev.categoria)}</span>` : ''}
        </div>
        <h3 class="event-card__title">${escapeHtml(ev.titulo)}</h3>
        ${(ev.curso || ev.aula || ev.lugar) ? `<p class="event-card__curso">${[ev.curso, ev.aula ? 'Aula: ' + ev.aula : '', ev.lugar].filter(Boolean).map(escapeHtml).join(' · ')}</p>` : ''}
        ${ev.desc ? `<p class="event-card__desc">${escapeHtml(ev.desc)}</p>` : ''}
      </div>
    `).join('');
  }

  $('modalOverlay').hidden = false;
  $('modalClose').focus();
}
function closeModal(){ $('modalOverlay').hidden = true; }

$('modalClose').addEventListener('click', closeModal);
$('modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

$('prevMonth').addEventListener('click', () => {
  current.month--; if (current.month < 0){ current.month = 11; current.year--; }
  monthSelected = true;
  renderMonth();
});
$('nextMonth').addEventListener('click', () => {
  current.month++; if (current.month > 11){ current.month = 0; current.year++; }
  monthSelected = true;
  renderMonth();
});
/* =====================================================================
   PARA EL BOTÓN ADICIONAL:
   Duplica el listener siguiente y cambia examToggle/examPanel por los ID
   del nuevo botón. Dentro del listener llama a su función de renderizado,
   por ejemplo renderAvisosList(), en vez de renderExamList().

   Ejemplo orientativo:

   $('avisosToggle').addEventListener('click', () => {
     const panel = $('avisosPanel');
     const btn = $('avisosToggle');
     const willOpen = panel.hidden;
     renderAvisosList();
     panel.hidden = !willOpen;
     btn.setAttribute('aria-expanded', String(willOpen));
   });

   También debes ampliar el listener global de document.addEventListener
   para cerrar avisosPanel al hacer clic fuera, igual que examPanel.
===================================================================== */
$('examToggle').addEventListener('click', () => {
  const panel = $('examPanel');
  const btn = $('examToggle');
  const willOpen = panel.hidden;
  renderExamList();
  panel.hidden = !willOpen;
  btn.setAttribute('aria-expanded', String(willOpen));
});

document.addEventListener('click', (e) => {
  const panel = $('examPanel');
  const btn = $('examToggle');
  if (!panel || panel.hidden) return;
  if (!panel.contains(e.target) && e.target !== btn){
    panel.hidden = true;
    btn.setAttribute('aria-expanded', 'false');
  }
});

$('todayBtn').addEventListener('click', () => {
  const t = new Date();
  if (withinRange(t.getFullYear(), t.getMonth())){
    current = { year: t.getFullYear(), month: t.getMonth() };
  } else {
    current = { year: CURSO_INICIO.year, month: CURSO_INICIO.month };
  }
  monthSelected = true;
  renderMonth();
});

renderMonthSelector();
loadData();
setInterval(loadData, 5 * 60 * 1000); // refresca datos cada 5 minutos
</script>
